name: Build and Deploy Frontend

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repo
      - name: Checkout code
        uses: actions/checkout@v3

      # 2. Setup Node (use your exact version)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      # 3. Install dependencies
      - name: Install dependencies
        run: npm ci

      # 4. Build project
      - name: Build project
        run: npm run build

      # 5. Archive dist
      - name: Archive build
        run: tar -czf dist.tar.gz dist

      # 6. Copy to server
      - name: Copy build to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.FIXSERV_AWS_HOST }}
          username: ${{ secrets.FIXSERV_AWS_USER }}
          key: ${{ secrets.FIXSERV_AWS_KEY }}
          source: "dist.tar.gz"
          target: "/tmp"

      # 7. Deploy on server
      - name: Deploy on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.FIXSERV_AWS_HOST }}
          username: ${{ secrets.FIXSERV_AWS_USER }}
          key: ${{ secrets.FIXSERV_AWS_KEY }}
          script: |
            set -e

            BASE_DIR="/var/www"
            RELEASES_DIR="$BASE_DIR/releases/frontend"
            CURRENT_LINK="$BASE_DIR/current"
            NEW_RELEASE="$RELEASES_DIR/$(date +%Y%m%d%H%M%S)"

            # Create releases directory if not exists
            mkdir -p $RELEASES_DIR

            # Create new release directory
            mkdir -p $NEW_RELEASE

            # Extract build into new release
            tar -xzf /tmp/dist.tar.gz -C $NEW_RELEASE

            # Move contents up (dist → root)
            mv $NEW_RELEASE/dist/* $NEW_RELEASE/
            rm -rf $NEW_RELEASE/dist

            # Atomically switch symlink
            ln -sfn $NEW_RELEASE $CURRENT_LINK

            # Ensure correct permissions (optional)
            sudo chown -R www-data:www-data $BASE_DIR

            # Cleanup uploaded archive
            rm /tmp/dist.tar.gz

            # Optional: keep only last 5 releases
            cd $RELEASES_DIR
            ls -dt */ | tail -n +6 | xargs -r rm -rf
